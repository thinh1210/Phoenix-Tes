services:
  # 1. Backend Service (Node.js)
  - type: web
    name: phoenix-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SUPABASE_URL
        sync: false # Render sẽ yêu cầu bạn nhập giá trị này khi deploy
      - key: SUPABASE_KEY
        sync: false # Render sẽ yêu cầu bạn nhập giá trị này khi deploy
      - key: JWT_SECRET
        generateValue: true # Render tự tạo chuỗi ngẫu nhiên bảo mật
      - key: FRONTEND_URL
        fromService:
          type: web
          name: phoenix-frontend
          envVarKey: RENDER_EXTERNAL_URL # Lấy tự động URL của frontend để cấu hình CORS

  # 2. Frontend Service (React/Vite Static Site)
  - type: web
    name: phoenix-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: phoenix-backend
          envVarKey: RENDER_EXTERNAL_URL # Lấy tự động URL của backend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html # Cho phép React Router hoạt động
