<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>OTA Manager</title>
</head>
<body class="bg-light text-dark">
    <div class="container py-5" style="max-width: 600px;">
        <div class="card shadow border-0 p-4">
            <h3 class="text-center mb-4">OTA Firmware Portal</h3>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Project Name</label>
                <input type="text" id="projName" class="form-control" list="existingProjects" placeholder="Nhập mới hoặc chọn...">
                <datalist id="existingProjects"></datalist>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Firmware File (.bin)</label>
                <input type="file" id="fileInp" class="form-control" accept=".bin">
            </div>

            <button onclick="handleUpload()" id="btnUp" class="btn btn-primary w-100 py-2">Upload & Deploy</button>

            <div id="status" class="mt-4 p-3 bg-white border rounded d-none" style="word-break: break-all;"></div>
        </div>
    </div>

    <script>
        async function loadProjects() {
            const r = await fetch('/api/projects');
            const projects = await r.json();
            document.getElementById('existingProjects').innerHTML = projects.map(p => `<option value="${p}">`).join('');
        }

        async function handleUpload() {
            const btn = document.getElementById('btnUp');
            const status = document.getElementById('status');
            const file = document.getElementById('fileInp').files[0];
            const name = document.getElementById('projName').value;

            if(!file || !name) return alert("Vui lòng điền đủ thông tin!");

            btn.disabled = true;
            btn.innerText = "Đang xử lý...";
            
            const fd = new FormData();
            fd.append('firmware', file);
            fd.append('projectName', name);

            try {
                const r = await fetch('/api/upload', { method: 'POST', body: fd });
                const d = await r.json();
                
                if (d.url) {
                    status.classList.remove('d-none');
                    // Sử dụng d.url thay vì các thuộc tính lồng cấp khác
                    status.innerHTML = `<strong>Link Firmware cho ESP32:</strong><br><small>${d.url}</small>`;
                } else {
                    alert("Không nhận được Link từ server!");
                }
                loadProjects();
            } catch (e) {
                alert("Lỗi kết nối server!");
            } finally {
                btn.disabled = false;
                btn.innerText = "Upload & Deploy";
            }
        }
        loadProjects();
    </script>
</body>
</html>
